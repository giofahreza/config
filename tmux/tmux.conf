# Zellij-like tmux keymap
# Source profile date: 2026-03-02 (from ~/.config/zellij/config.kdl)

# Keep tab/pane indexes aligned with Zellij (1-based)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Zellij "locked -> normal" equivalent uses Ctrl-b
set -g prefix C-b
bind C-b send-prefix
# Disable Ctrl-g in all common tables so it does nothing anywhere in tmux.
unbind-key -n C-g
unbind-key -T root C-g
unbind-key -T prefix C-g
unbind-key -T copy-mode C-g
unbind-key -T copy-mode-vi C-g

# Bottom helper bar (Zellij-like mode hints)
set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-justify left
set -g status-left '#[fg=colour39,bold]#S #[fg=colour244]| '
set -g status-left-length 24
set -g status-right ""
set -g status-right-length 240
set -g status-style "bg=colour236,fg=colour250"
set -g message-style "bg=colour236,fg=colour255"
set -g window-status-style "bg=colour236,fg=colour248"
set -g window-status-current-style "bg=colour236,fg=colour255,bold"

# Mouse scroll should use tmux scrollback (copy-mode), not shell up/down keys.
set -g mouse on
set -g history-limit 50000
unbind -n WheelUpPane
unbind -n WheelDownPane
bind -n WheelUpPane if-shell -F "#{mouse_any_flag}" "send-keys -M" "if-shell -F '#{pane_in_mode}' 'send-keys -X -N 3 scroll-up' 'copy-mode -e; send-keys -X -N 3 scroll-up'"
bind -n WheelDownPane if-shell -F "#{mouse_any_flag}" "send-keys -M" "if-shell -F '#{pane_in_mode}' 'send-keys -X -N 3 scroll-down' 'send-keys -M'"
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 3 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down
bind-key -T copy-mode WheelUpPane send-keys -X -N 3 scroll-up
bind-key -T copy-mode WheelDownPane send-keys -X -N 3 scroll-down

set -g @zj_help_root   '#[fg=colour39,bold]LOCKED #[fg=colour250]Alt+h/j/k/l pane  Alt+,/Alt+. tab  Alt+n pane  C-b modes'
set -g @zj_help_prefix '#[fg=colour226,bold]NORMAL #[fg=colour250]p pane  t tab  n resize  h move  s scroll  o session  b tmux'
set -g @zj_help_pane   '#[fg=colour82,bold]PANE #[fg=colour250]h/j/k move  l/u split left/up  d/r split down/right  n pane'
set -g @zj_help_tab    '#[fg=colour87,bold]TAB #[fg=colour250]h/l prev/next  1-9 goto  n new  r rename  x close  s sync  [ break'
set -g @zj_help_resize '#[fg=colour208,bold]RESIZE #[fg=colour250]h/j/k/l resize  H/J/K/L reverse  C-n done'
set -g @zj_help_move   '#[fg=colour213,bold]MOVE #[fg=colour250]h/j/k/l swap  n/p layout  Tab swap  C-h done'
set -g @zj_help_scroll '#[fg=colour117,bold]SCROLL #[fg=colour250]s copy-mode  Enter/Esc done'
set -g @zj_help_session '#[fg=colour141,bold]SESSION #[fg=colour250]d detach  C-e done'
set -g @zj_help_tmux   '#[fg=colour45,bold]TMUX #[fg=colour250]\"/% split  c new-tab  n/p next-prev  o next-pane  z zoom  d detach'
set -g status-right '#{?#{==:#{client_key_table},prefix},#{@zj_help_prefix},#{?#{==:#{client_key_table},zj_pane},#{@zj_help_pane},#{?#{==:#{client_key_table},zj_tab},#{@zj_help_tab},#{?#{==:#{client_key_table},zj_resize},#{@zj_help_resize},#{?#{==:#{client_key_table},zj_move},#{@zj_help_move},#{?#{==:#{client_key_table},zj_scroll},#{@zj_help_scroll},#{?#{==:#{client_key_table},zj_session},#{@zj_help_session},#{?#{==:#{client_key_table},zj_tmux},#{@zj_help_tmux},#{@zj_help_root}}}}}}}}}'

# Locked-mode style global shortcuts
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R
bind-key -n M-, previous-window
bind-key -n M-. next-window
bind-key -n M-n split-window -c "#{pane_current_path}"
bind-key -n C-q confirm-before -p "Kill current tmux session? (y/n)" kill-session

# "normal mode" selectors (Ctrl-b + key)
bind-key -T prefix p switch-client -T zj_pane
bind-key -T prefix t switch-client -T zj_tab
bind-key -T prefix n switch-client -T zj_resize
bind-key -T prefix h switch-client -T zj_move
bind-key -T prefix s switch-client -T zj_scroll
bind-key -T prefix o switch-client -T zj_session
bind-key -T prefix b switch-client -T zj_tmux
bind-key -T prefix '"' split-window -v -c "#{pane_current_path}"
bind-key -T prefix % split-window -h -c "#{pane_current_path}"
bind-key -T prefix c new-window -c "#{pane_current_path}"
bind-key -T prefix Enter switch-client -T root
bind-key -T prefix Escape switch-client -T root

# Pane mode (Ctrl-b p ...)
bind-key -T zj_pane Left  select-pane -L \; switch-client -T zj_pane
bind-key -T zj_pane Down  select-pane -D \; switch-client -T zj_pane
bind-key -T zj_pane Up    select-pane -U \; switch-client -T zj_pane
bind-key -T zj_pane Right select-pane -R \; switch-client -T zj_pane
bind-key -T zj_pane h     select-pane -L \; switch-client -T zj_pane
bind-key -T zj_pane j     select-pane -D \; switch-client -T zj_pane
bind-key -T zj_pane k     select-pane -U \; switch-client -T zj_pane
bind-key -T zj_pane l     split-window -h -b -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zj_pane u     split-window -v -b -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zj_pane c     command-prompt -p "Rename pane:" "select-pane -T '%%'" \; switch-client -T root
bind-key -T zj_pane d     split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zj_pane e     display-message "Not supported in tmux: floating panes" \; switch-client -T root
bind-key -T zj_pane f     resize-pane -Z \; switch-client -T root
bind-key -T zj_pane i     display-message "Not supported in tmux: pane pinning" \; switch-client -T root
bind-key -T zj_pane n     split-window -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zj_pane p     last-pane \; switch-client -T zj_pane
bind-key -T zj_pane C-p   switch-client -T root
bind-key -T zj_pane r     split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zj_pane s     display-message "Not supported in tmux: stacked panes" \; switch-client -T root
bind-key -T zj_pane w     display-message "Not supported in tmux: floating panes" \; switch-client -T root
bind-key -T zj_pane z     display-message "Not supported in tmux: pane frames toggle" \; switch-client -T root
bind-key -T zj_pane x     confirm-before -p "Kill pane? (y/n)" kill-pane \; switch-client -T root
bind-key -T zj_pane Enter switch-client -T root
bind-key -T zj_pane Escape switch-client -T root

# Tab mode (Ctrl-b t ...)
bind-key -T zj_tab Left   previous-window \; switch-client -T zj_tab
bind-key -T zj_tab Down   next-window \; switch-client -T zj_tab
bind-key -T zj_tab Up     previous-window \; switch-client -T zj_tab
bind-key -T zj_tab Right  next-window \; switch-client -T zj_tab
bind-key -T zj_tab h      previous-window \; switch-client -T zj_tab
bind-key -T zj_tab j      next-window \; switch-client -T zj_tab
bind-key -T zj_tab k      previous-window \; switch-client -T zj_tab
bind-key -T zj_tab l      next-window \; switch-client -T zj_tab
bind-key -T zj_tab 1      select-window -t 1 \; switch-client -T root
bind-key -T zj_tab 2      select-window -t 2 \; switch-client -T root
bind-key -T zj_tab 3      select-window -t 3 \; switch-client -T root
bind-key -T zj_tab 4      select-window -t 4 \; switch-client -T root
bind-key -T zj_tab 5      select-window -t 5 \; switch-client -T root
bind-key -T zj_tab 6      select-window -t 6 \; switch-client -T root
bind-key -T zj_tab 7      select-window -t 7 \; switch-client -T root
bind-key -T zj_tab 8      select-window -t 8 \; switch-client -T root
bind-key -T zj_tab 9      select-window -t 9 \; switch-client -T root
bind-key -T zj_tab '['    break-pane \; switch-client -T root
bind-key -T zj_tab ']'    break-pane \; switch-client -T root
bind-key -T zj_tab b      break-pane \; switch-client -T root
bind-key -T zj_tab n      new-window -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zj_tab r      command-prompt -I "#W" "rename-window -- '%%'" \; switch-client -T root
bind-key -T zj_tab s      setw synchronize-panes \; switch-client -T root
bind-key -T zj_tab C-t    switch-client -T root
bind-key -T zj_tab x      confirm-before -p "Kill window? (y/n)" kill-window \; switch-client -T root
bind-key -T zj_tab Tab    last-window \; switch-client -T zj_tab
bind-key -T zj_tab Enter  switch-client -T root
bind-key -T zj_tab Escape switch-client -T root

# Resize mode (Ctrl-b n ...)
bind-key -T zj_resize Left  resize-pane -L 2 \; switch-client -T zj_resize
bind-key -T zj_resize Down  resize-pane -D 2 \; switch-client -T zj_resize
bind-key -T zj_resize Up    resize-pane -U 2 \; switch-client -T zj_resize
bind-key -T zj_resize Right resize-pane -R 2 \; switch-client -T zj_resize
bind-key -T zj_resize h     resize-pane -L 2 \; switch-client -T zj_resize
bind-key -T zj_resize j     resize-pane -D 2 \; switch-client -T zj_resize
bind-key -T zj_resize k     resize-pane -U 2 \; switch-client -T zj_resize
bind-key -T zj_resize l     resize-pane -R 2 \; switch-client -T zj_resize
bind-key -T zj_resize H     resize-pane -R 2 \; switch-client -T zj_resize
bind-key -T zj_resize J     resize-pane -U 2 \; switch-client -T zj_resize
bind-key -T zj_resize K     resize-pane -D 2 \; switch-client -T zj_resize
bind-key -T zj_resize L     resize-pane -L 2 \; switch-client -T zj_resize
bind-key -T zj_resize +     resize-pane -Z \; switch-client -T zj_resize
bind-key -T zj_resize =     resize-pane -Z \; switch-client -T zj_resize
bind-key -T zj_resize -     resize-pane -Z \; switch-client -T zj_resize
bind-key -T zj_resize C-n   switch-client -T root
bind-key -T zj_resize Enter switch-client -T root
bind-key -T zj_resize Escape switch-client -T root

# Move mode (Ctrl-b h ...)
bind-key -T zj_move Left  swap-pane -U \; switch-client -T zj_move
bind-key -T zj_move Down  swap-pane -D \; switch-client -T zj_move
bind-key -T zj_move Up    swap-pane -U \; switch-client -T zj_move
bind-key -T zj_move Right swap-pane -D \; switch-client -T zj_move
bind-key -T zj_move h     swap-pane -U \; switch-client -T zj_move
bind-key -T zj_move j     swap-pane -D \; switch-client -T zj_move
bind-key -T zj_move k     swap-pane -U \; switch-client -T zj_move
bind-key -T zj_move l     swap-pane -D \; switch-client -T zj_move
bind-key -T zj_move n     select-layout next \; switch-client -T zj_move
bind-key -T zj_move p     select-layout previous \; switch-client -T zj_move
bind-key -T zj_move Tab   swap-pane -D \; switch-client -T zj_move
bind-key -T zj_move C-h   switch-client -T root
bind-key -T zj_move Enter switch-client -T root
bind-key -T zj_move Escape switch-client -T root

# Scroll mode (Ctrl-b s ...)
bind-key -T zj_scroll s      copy-mode \; switch-client -T root
bind-key -T zj_scroll e      command-prompt -p "Edit scrollback (not supported)" "" \; switch-client -T root
bind-key -T zj_scroll Enter  switch-client -T root
bind-key -T zj_scroll Escape switch-client -T root

# Session mode (Ctrl-b o ...)
bind-key -T zj_session d      detach-client \; switch-client -T root
bind-key -T zj_session a      display-message "Not supported in tmux: about plugin" \; switch-client -T root
bind-key -T zj_session c      display-message "Not supported in tmux: configuration plugin" \; switch-client -T root
bind-key -T zj_session p      display-message "Not supported in tmux: plugin manager" \; switch-client -T root
bind-key -T zj_session s      display-message "Not supported in tmux: share plugin" \; switch-client -T root
bind-key -T zj_session w      display-message "Not supported in tmux: session manager plugin" \; switch-client -T root
bind-key -T zj_session C-e    switch-client -T root
bind-key -T zj_session Enter  switch-client -T root
bind-key -T zj_session Escape switch-client -T root

# Tmux mode (Ctrl-b b ...)
bind-key -T zj_tmux Left   select-pane -L \; switch-client -T root
bind-key -T zj_tmux Down   select-pane -D \; switch-client -T root
bind-key -T zj_tmux Up     select-pane -U \; switch-client -T root
bind-key -T zj_tmux Right  select-pane -R \; switch-client -T root
bind-key -T zj_tmux h      select-pane -L \; switch-client -T root
bind-key -T zj_tmux j      select-pane -D \; switch-client -T root
bind-key -T zj_tmux k      select-pane -U \; switch-client -T root
bind-key -T zj_tmux l      select-pane -R \; switch-client -T root
bind-key -T zj_tmux Space  next-layout \; switch-client -T zj_tmux
bind-key -T zj_tmux '"'    split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zj_tmux %      split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zj_tmux ,      command-prompt -I "#W" "rename-window -- '%%'" \; switch-client -T root
bind-key -T zj_tmux '['    copy-mode \; switch-client -T root
bind-key -T zj_tmux C-b    send-prefix \; switch-client -T root
bind-key -T zj_tmux c      new-window -c "#{pane_current_path}" \; switch-client -T root
bind-key -T zj_tmux n      next-window \; switch-client -T root
bind-key -T zj_tmux o      select-pane -t :.+
bind-key -T zj_tmux p      previous-window \; switch-client -T root
bind-key -T zj_tmux z      resize-pane -Z \; switch-client -T root
bind-key -T zj_tmux x      confirm-before -p "Kill pane? (y/n)" kill-pane \; switch-client -T root
bind-key -T zj_tmux d      detach-client \; switch-client -T root
bind-key -T zj_tmux Enter  switch-client -T root
bind-key -T zj_tmux Escape switch-client -T root
